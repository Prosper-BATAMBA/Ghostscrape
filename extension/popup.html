<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e4e9;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .badge {
      margin-left: auto;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge.connected { background: rgba(34,197,94,0.15); color: #22c55e; }
    .badge.disconnected { background: rgba(239,68,68,0.15); color: #ef4444; }
    .body { padding: 12px 14px; }
    .info { font-size: 12px; color: #8b8fa3; margin-bottom: 10px; line-height: 1.5; }
    .btn {
      display: block;
      width: 100%;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-primary { background: #6c8cff; color: #fff; }
    .btn-primary:hover { background: #5a78e6; }
    .btn-secondary { background: rgba(255,255,255,0.06); color: #e2e4e9; margin-top: 6px; }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); }
    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 0;
      font-size: 12px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green { background: #22c55e; }
    .dot.red { background: #ef4444; }
    .dot.amber { background: #eab308; }
    .footer {
      padding: 8px 14px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 11px;
      color: #5c5f6e;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6c8cff" stroke-width="2">
      <path d="M12 3a5 5 0 0 0-5 5c0 2.5 1.5 4.5 3 6l2 3 2-3c1.5-1.5 3-3.5 3-6a5 5 0 0 0-5-5z"/>
      <circle cx="12" cy="8" r="1.5" fill="#6c8cff" stroke="none"/>
    </svg>
    <h1>GhostScrape</h1>
    <span class="badge" id="statusBadge">OFF</span>
  </div>

  <div class="body">
    <div class="status-row">
      <span class="dot" id="connectionDot"></span>
      <span id="connectionText">Connecting...</span>
    </div>
    <div class="info" id="tabInfo">No active tab</div>
    <a href="http://localhost:3000" target="_blank" class="btn btn-primary" id="openDashboard">
      Open Dashboard
    </a>
    <button class="btn btn-secondary" id="reconnectBtn">Reconnect</button>
  </div>

  <div class="footer">v0.2.0</div>

  <script src="popup.js"></script>
</body>
</html>
